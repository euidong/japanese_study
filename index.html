<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>일본어 동사 퀴즈</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main>
    <section id="screen-start">
      <h1>일본어 동사 퀴즈</h1>
      <p>그림을 보고 알맞은 답을 고르세요.</p>
      <form id="start-form">
        <label>모드</label>
        <div class="chips chips-mode">
          <label><input type="radio" name="mode" value="masu" checked><span>마스형 맞추기</span></label>
          <label><input type="radio" name="mode" value="meaning"><span>뜻 맞추기</span></label>
          <label><input type="radio" name="mode" value="ja"><span>일본어 맞추기</span></label>
        </div>
        <label>문항 수</label>
        <div class="chips">
          <label><input type="radio" name="count" value="15" checked><span>15</span></label>
          <label><input type="radio" name="count" value="30"><span>30</span></label>
          <label><input type="radio" name="count" value="45"><span>45</span></label>
        </div>
        <button type="submit">시작</button>
      </form>
    </section>

    <section id="screen-quiz" hidden>
      <div class="topbar">
        <button type="button" id="stopBtn" class="stop-btn" aria-label="그만두기">그만두기</button>
        <div class="progress"><span id="qNum">1</span> / <span id="qTotal">15</span></div>
        <div class="score">정답 <span id="qScore">0</span></div>
      </div>
      <div class="progressbar"><div id="progressFill"></div></div>
      <div class="image-wrap" id="imageWrap">
        <button type="button" id="revealImageBtn" class="reveal-image-btn" hidden>그림 힌트 보기</button>
        <img id="qImage" src="" alt="">
      </div>
      <div class="hints" id="hints"></div>
      <div class="question-label" id="qLabel"></div>
      <div class="choices" id="choices"></div>
    </section>

    <section id="screen-result" hidden>
      <h2>결과</h2>
      <div class="score-summary">
        <div class="big-score"><span id="rScore">0</span> / <span id="rTotal">0</span></div>
        <div class="big-percent"><span id="rPercent">0</span>%</div>
      </div>
      <h3 id="wrongHeader" hidden>틀린 문제</h3>
      <div id="wrongList"></div>
      <button id="restart">다시 시작</button>
    </section>
  </main>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
